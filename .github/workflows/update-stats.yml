name: Update City Stats

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(node -p "require('./package.json').dependencies.playwright")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Download latest stats
        env:
          ONEDRIVE_STATS_URL: ${{ secrets.ONEDRIVE_STATS_URL }}
        run: node download.js

      - name: Validate download
        run: |
          echo "Preview:"
          head -c 200 stats.json.new
          echo

          if grep -qi "<html" stats.json.new; then
            echo "ERROR: Received HTML instead of JSON."
            exit 1
          fi

      - name: Commit updated stats
        run: |
          if cmp -s stats.json.new stats.json; then
            echo "No changes."
            rm stats.json.new
            exit 0
          fi

          mv stats.json.new stats.json

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add stats.json
          git commit -m "Update city stats"
          git push
