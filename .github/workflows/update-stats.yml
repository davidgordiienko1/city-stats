name: Update City Stats

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install

      - name: Create download script
        run: |
          cat > download.js << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
          
            const context = await browser.newContext({
              acceptDownloads: true
            });
          
            const page = await context.newPage();
            const url = process.env.ONEDRIVE_STATS_URL;
          
            console.log("Opening (forcing download):", url);
          
            // Go to blank first
            await page.goto('about:blank');
          
            // Listen for download
            const downloadPromise = page.waitForEvent('download');
          
            // Trigger download without navigation handling
            await page.evaluate((u) => {
              window.location.href = u;
            }, url).catch(() => {});
          
            const download = await downloadPromise;
          
            await download.saveAs('stats.json.new');
          
            console.log("✅ Download complete");
          
            await browser.close();
          })();
          EOF

      - name: Download latest stats (Playwright)
        env:
          ONEDRIVE_STATS_URL: ${{ secrets.ONEDRIVE_STATS_URL }}
        run: node download.js

      - name: Validate JSON file
        run: |
          echo "Preview:"
          head -c 200 stats.json.new
          echo ""

          if grep -qi "<html" stats.json.new; then
            echo "ERROR: Received HTML instead of JSON"
            exit 1
          fi

      - name: Replace if changed
        run: |
          if ! cmp -s stats.json.new stats.json; then
            mv stats.json.new stats.json
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add stats.json
            git commit -m "Update city stats"
            git push
          else
            echo "No changes."
          fi
